  <path d="M 73 57 L 74 54" stroke="#3D2010" stroke-width="1.2" stroke-linecap="round"/>
  <!-- ほっぺ -->
  <circle cx="42" cy="73" r="7.5" fill="#FFB3C0" opacity="0.55"/>
  <circle cx="78" cy="73" r="7.5" fill="#FFB3C0" opacity="0.55"/>
