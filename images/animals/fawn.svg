  <ellipse cx="49" cy="63" rx="7" ry="7" fill="#3D2010"/>
  <ellipse cx="71" cy="63" rx="7" ry="7" fill="#3D2010"/>
  <circle cx="51.5" cy="60.5" r="2.2" fill="white"/>
  <circle cx="73.5" cy="60.5" r="2.2" fill="white"/>
  <!-- まつげ -->
  <path d="M 44 58 L 42 55" stroke="#3D2010" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M 47 57 L 46 54" stroke="#3D2010" stroke-width="1.2" stroke-linecap="round"/>
